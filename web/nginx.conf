server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Never cache the HTML entry point so clients (incl. iOS home-screen web apps)
  # always pick up the latest build and its new hashed asset URLs.
  location = /index.html {
    add_header Cache-Control "no-cache, must-revalidate";
  }

  # Same-origin API: proxy /api to the API container (keeps the /api prefix).
  location /api/ {
    proxy_pass http://api:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
