services:
  postgres:
    image: postgres:16-alpine
    container_name: ancestry-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ancestry
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ancestry}
      POSTGRES_DB: ancestry
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ancestry -d ancestry"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ancestry-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://ancestry:${POSTGRES_PASSWORD:-ancestry}@postgres:5432/ancestry
      PORT: "3000"
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
    ports:
      - "${API_PORT:-3100}:3000"
    profiles:
      - prod

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: ancestry-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-8080}:80"
    profiles:
      - prod

volumes:
  postgres-data:
    name: ancestry-postgres-data
