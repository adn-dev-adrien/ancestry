name: Deploy to Raspberry Pi

# Deploys the current code to the self-hosted Pi runner when you push to the `release` branch
# or publish a GitHub Release. A manual run is also available from the Actions tab.
on:
  push:
    branches: [release]
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: deploy-pi
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write environment file
        run: |
          umask 077
          cat > .env <<EOF
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          VITE_API_URL=/api
          VITE_COMMIT_SHA=${{ github.sha }}
          CORS_ORIGIN=${{ vars.CORS_ORIGIN || 'http://localhost:8080' }}
          WEB_PORT=${{ vars.WEB_PORT || '8080' }}
          API_PORT=${{ vars.API_PORT || '3100' }}
          EOF

      - name: Stop previous stack
        run: docker compose --profile prod down --remove-orphans

      - name: Build images
        run: docker compose --profile prod build

      - name: Start database
        run: docker compose --profile prod up -d postgres

      - name: Apply database migrations
        run: docker compose --profile prod run --rm api npx prisma migrate deploy

      - name: Start the stack
        run: docker compose --profile prod up -d

      - name: Prune dangling images
        if: always()
        run: docker image prune -f
